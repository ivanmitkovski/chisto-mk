# Gitleaks configuration for chisto-mk.
#
# Extends the upstream default ruleset (so real secret detection stays on) and
# allowlists deterministic, non-secret fixtures used only in automated tests
# (fake token ids such as `a1b2c3d4e5f6`). These never reference live systems.
title = "chisto-mk gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Non-secret test fixtures and placeholder values"
paths = [
  '''apps/api/test/.*''',
]
regexes = [
  '''a1b2c3d4e5f6''',
  '''reuse-tid''',
  '''logout-tid''',
]
