name: chisto_mobile
description: Chisto.mk civic environmental platform mobile app. Report pollution, join cleanup events.
publish_to: 'none'

version: 1.0.0+12

environment:
  sdk: ^3.11.0

workspace:
  - packages/chisto_core
  - packages/chisto_networking
  - packages/chisto_infrastructure
  - packages/chisto_persistence
  - packages/chisto_localization
  - packages/design_system
  - packages/feature_auth
  - packages/feature_home
  - packages/feature_events
  - packages/feature_reports
  - packages/feature_profile
  - packages/feature_notifications
  - packages/feature_onboarding
  - packages/feature_safety

dependency_overrides:
  path_provider_foundation: 2.4.3
  analyzer: ^7.7.1
  test_api: 0.7.9

# sqflite_common_ffi (desktop/tests) pulls in package:sqlite3 hooks. Mobile uses native
# sqflite and never loads the FFI copy at runtime; use OS SQLite to avoid downloading
# prebuilt dylibs from GitHub during iOS/Android native-asset builds.
hooks:
  user_defines:
    sqlite3:
      source: system

dependencies:
  flutter:
    sdk: flutter
  design_system:
  chisto_core:
  chisto_infrastructure:
  chisto_networking:
  feature_auth:
  feature_reports:
  feature_safety:
  feature_events:
  feature_home:
  feature_onboarding:
  feature_profile:
  feature_notifications:
  flutter_localizations:
    sdk: flutter
  intl: any
  google_fonts: ^6.3.3
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.1
  geocoding: ^3.0.0
  geolocator: ^12.0.0
  flutter_map: ^7.0.2
  clock: ^1.1.2
  http: ^1.2.2
  http_parser: ^4.0.2
  latlong2: ^0.9.0
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  flutter_image_compress: ^2.3.0
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.4
  workmanager: ^0.9.0+3
  package_info_plus: ^9.0.1
  path: ^1.9.1
  flutter_map_animations: ^0.8.0
  flutter_map_heatmap: ^0.0.8
  add_2_calendar: ^3.0.1
  share_plus: ^10.0.0
  url_launcher: ^6.3.1
  app_links: ^6.4.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  flutter_secure_storage: ^10.0.0
  lottie: ^3.3.0
  flutter_confetti: ^0.5.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.0
  visibility_detector: ^0.4.0+2
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  crop_your_image: ^2.0.0
  video_player: ^2.11.1
  chewie: ^1.13.0
  just_audio: ^0.10.5
  file_picker: ^11.0.2
  socket_io_client: ^3.1.4
  mime: ^2.0.0
  photo_view: ^0.15.0
  pdfx: ^2.9.2
  record: ^6.0.0
  permission_handler: ^12.0.0
  open_filex: ^4.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  sentry_flutter: ^9.19.0
  app_badge_plus: ^1.2.10

dev_dependencies:
  melos: ^6.3.2
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_local_notifications_platform_interface: ^8.0.0
  path_provider_platform_interface: ^2.1.2
  flutter_lints: ^6.0.0
  very_good_analysis: ^7.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/content/
    - assets/images/references/
    - assets/animations/
    - assets/map_boundaries/
    - assets/fonts/

# Regenerate launcher bitmaps: cd apps/mobile && dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/icon-1024.png
  adaptive_icon_background: assets/icons/adaptive_icon_background.png
  adaptive_icon_foreground: assets/icons/adaptive_icon_foreground.png
  remove_alpha_ios: true
