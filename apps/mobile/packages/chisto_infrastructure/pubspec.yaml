name: chisto_infrastructure
description: App shell — core, shared widgets, and l10n for Chisto mobile workspace packages.
version: 0.0.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  chisto_core:
  chisto_localization:
  chisto_networking:
  chisto_persistence:
  design_system:
  feature_auth:
  feature_events:
  feature_home:
  feature_notifications:
  feature_onboarding:
  feature_profile:
  feature_reports:
  feature_safety:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.2
  http_parser: ^4.0.2
  connectivity_plus: ^6.1.4
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.3
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  sentry_flutter: ^9.19.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0+3
  app_links: ^6.4.0
  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.0
  flutter_map: ^7.0.2
  google_fonts: ^6.3.3
  flutter_svg: ^2.2.1
  image_picker: ^1.2.1
  permission_handler: ^12.0.0
  device_info_plus: ^11.2.0
  package_info_plus: ^9.0.1
  clock: ^1.1.2
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
