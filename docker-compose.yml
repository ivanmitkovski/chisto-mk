services:
  postgres:
    image: postgis/postgis:16-3.5
    platform: linux/amd64
    environment:
      POSTGRES_USER: chisto
      POSTGRES_PASSWORD: chisto
      POSTGRES_DB: chisto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chisto"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
