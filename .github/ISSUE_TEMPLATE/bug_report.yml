name: Bug report
description: Internal bug report for the Chisto.mk team
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        For security issues, email info@ekohab.mk instead of filing here.

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - API
        - Admin
        - Landing
        - Mobile (iOS)
        - Mobile (Android)
        - Infrastructure / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: e.g. production, develop, local; browser/device; app version
    validations:
      required: false
