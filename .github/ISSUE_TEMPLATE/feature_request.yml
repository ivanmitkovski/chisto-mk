name: Feature request
description: Internal feature or improvement proposal
title: "[feat]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Internal team use. Describe the user or operator problem, not just a solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve for citizens, organizers, or moderators?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
