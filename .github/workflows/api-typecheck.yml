name: API typecheck

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'pnpm-lock.yaml'
  push:
    branches: [develop, main]

env:
  # prisma.config.ts requires DATABASE_URL at config load time (generate does not connect).
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @chisto/api exec prisma generate
      - run: pnpm --filter @chisto/api run typecheck
      - run: pnpm --filter @chisto/api run openapi:pii
