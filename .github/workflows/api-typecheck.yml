name: API typecheck

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'pnpm-lock.yaml'
  push:
    branches: [develop, main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @chisto/api exec prisma generate
      - run: pnpm --filter @chisto/api run typecheck
      - run: pnpm --filter @chisto/api run openapi:pii
