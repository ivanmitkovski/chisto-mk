name: Mobile PR checks

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-pr.yml'

jobs:
  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Format
        run: dart format --set-exit-if-changed lib test tool
      - name: Analyze
        run: flutter analyze --no-fatal-infos lib
      - name: Design guards
        run: |
          dart run tool/check_release_env.dart
          dart run tool/check_pii_in_logs.dart
          dart run tool/check_arb_key_parity.dart
          dart run tool/check_min_tap_target.dart
          dart run tool/check_no_magic_edge_insets_in_features.dart
      - name: Unit tests
        run: flutter test test/
      - name: Debug APK smoke
        run: flutter build apk --debug --dart-define=ENV=dev
