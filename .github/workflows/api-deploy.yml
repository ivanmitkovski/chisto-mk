name: API deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: awsDev
        type: choice
        options:
          - awsDev
          - staging
          - production
  push:
    branches: [develop, main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-deploy.yml'

concurrency:
  group: api-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'chisto-api' }}

permissions:
  contents: read
  id-token: write

# Optional AWS deploy jobs: set repository variable API_AWS_DEPLOY=true when
# AWS_ROLE_ARN, ECS_*, and related secrets are configured (secrets cannot
# appear in job `if:` expressions).
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -f apps/api/Dockerfile.prod -t chisto-api:${{ github.sha }} .

      - name: Smoke health (no DB)
        run: |
          docker run -d --name api-smoke \
            -e NODE_ENV=test \
            -e DATABASE_URL=postgresql://u:p@127.0.0.1:5432/db \
            -e JWT_SECRET=01234567890123456789012345678901 \
            -e SKIP_MIGRATE_STATUS_CHECK=1 \
            -p 3099:3000 \
            chisto-api:${{ github.sha }}
          ok=0
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3099/health >/dev/null; then
              ok=1
              break
            fi
            sleep 2
          done
          if [ "$ok" != "1" ]; then
            echo "::error::GET /health did not return 200 within 60s"
            docker logs api-smoke 2>&1 || true
            docker rm -f api-smoke
            exit 1
          fi
          docker rm -f api-smoke

  push-ecr:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.API_AWS_DEPLOY == 'true' }}
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        id: push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # ECR repo enforces immutable tags, so publish only the unique,
          # commit-pinned tag. Deploys reference this exact image (no :latest).
          IMAGE="${REGISTRY}/${ECR_REPOSITORY}"
          docker build -f apps/api/Dockerfile.prod -t "${IMAGE}:${GITHUB_SHA}" .
          docker push "${IMAGE}:${GITHUB_SHA}"
          DIGEST=$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${GITHUB_SHA}" \
            --query 'imageDetails[0].imageDigest' --output text)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  migrate:
    needs: push-ecr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run ECS migrate task
        env:
          IMAGE: ${{ needs.push-ecr.outputs.image }}
        run: |
          # Pin the migrate task to the freshly pushed immutable image.
          aws ecs describe-task-definition \
            --task-definition "${{ secrets.ECS_MIGRATE_TASK_DEFINITION }}" \
            --query 'taskDefinition' > migrate-td.json
          jq --arg IMG "$IMAGE" '
            .containerDefinitions[0].image = $IMG
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' migrate-td.json > migrate-td-new.json
          MIGRATE_TD=$(aws ecs register-task-definition \
            --cli-input-json file://migrate-td-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --task-definition "$MIGRATE_TD" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNETS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP }}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "${{ secrets.ECS_CLUSTER }}" --tasks "$TASK_ARN"
          EXIT=$(aws ecs describe-tasks --cluster "${{ secrets.ECS_CLUSTER }}" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          test "$EXIT" = "0"

  deploy-ecs:
    needs: [push-ecr, migrate]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rolling ECS deploy
        env:
          IMAGE: ${{ needs.push-ecr.outputs.image }}
        run: |
          # Roll the service onto a new task-definition revision pinned to the
          # immutable image (ECR tags are immutable, so :latest is not used).
          CURRENT_TD=$(aws ecs describe-services \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVICE }}" \
            --query 'services[0].taskDefinition' --output text)
          aws ecs describe-task-definition --task-definition "$CURRENT_TD" \
            --query 'taskDefinition' > service-td.json
          jq --arg IMG "$IMAGE" '
            .containerDefinitions[0].image = $IMG
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' service-td.json > service-td-new.json
          NEW_TD=$(aws ecs register-task-definition \
            --cli-input-json file://service-td-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVICE }}" \
            --task-definition "$NEW_TD" \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVICE }}"

  verify-staging:
    needs: deploy-ecs
    runs-on: ubuntu-latest
    if: ${{ vars.API_STAGING_VERIFY == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: verify:v1
        env:
          API_BASE: ${{ secrets.STAGING_API_BASE }}
          AUTH_TOKEN: ${{ secrets.STAGING_AUTH_TOKEN }}
        run: pnpm --filter @chisto/api run verify:v1
      - name: Blackbox probe
        env:
          API_BASE: ${{ secrets.STAGING_API_BASE }}
        run: node apps/api/scripts/blackbox-probe.mjs

  cosign-sign:
    needs: push-ecr
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.API_COSIGN == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: sigstore/cosign-installer@v3
      - name: Sign image by digest
        run: cosign sign --yes "${{ secrets.COSIGN_ECR_IMAGE }}@${{ needs.push-ecr.outputs.image_digest }}"

      - name: Attach SBOM
        run: |
          IMAGE="${{ secrets.COSIGN_ECR_IMAGE }}@${{ needs.push-ecr.outputs.image_digest }}"
          echo '{"spdxVersion":"2.3","name":"chisto-api","packages":[]}' > sbom.spdx.json
          cosign attach sbom --sbom sbom.spdx.json "$IMAGE"
