version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      # NestJS 10 is pinned via pnpm overrides in the root package.json;
      # major bumps break the frozen lockfile until we migrate deliberately.
      - dependency-name: "@nestjs/*"
        update-types: ["version-update:semver-major"]
      # TipTap v3 requires upgrading @tiptap/* packages together and editor API changes.
      - dependency-name: "@tiptap/*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies

  # Dockerfiles live under apps/api, not the repo root.
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
